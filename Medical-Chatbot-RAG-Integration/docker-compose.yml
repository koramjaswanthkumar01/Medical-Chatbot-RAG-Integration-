services:
  etl:
    build:
      context: ./hospital_neo4j_etl
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - app-network
    restart: "no"

  api:
    build:
      context: ./chatbot_api
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./chatbot_frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8501:8501"
    networks:
      - app-network
    depends_on:
      - api
    environment:
      - CHATBOT_URL=http://api:8000/hospital-rag-agent

networks:
  app-network:
    driver: bridge
